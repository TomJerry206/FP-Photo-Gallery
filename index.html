<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Photo Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>

<body onload="addTabFocus()">

    <h1>My Photo Gallery</h1>

   
    <div id="image">
        <img id="preview" src="" alt="">
    </div>

   
    <div class="gallery">

        
        <img src="images/beach.jpg" alt="beach"
        onmouseover="upDate(this)" onmouseleave="unDo()"
        onfocus="upDate(this)" onblur="unDo()">

        <img src="images/mountain.jpg" alt="mountain"
        onmouseover="upDate(this)" onmouseleave="unDo()"
        onfocus="upDate(this)" onblur="unDo()">

        <img src="images/galaxy.jpg" alt="galaxy"
        onmouseover="upDate(this)" onmouseleave="unDo()"
        onfocus="upDate(this)" onblur="unDo()">

   
        <img src="images/car1.jpg" alt="car"
        onmouseover="upDate(this)" onmouseleave="unDo()"
        onfocus="upDate(this)" onblur="unDo()">

        <img src="images/bike.jpg" alt="motorbike"
        onmouseover="upDate(this)" onmouseleave="unDo()"
        onfocus="upDate(this)" onblur="unDo()">

        <img src="images/truck.jpg" alt="truck"
        onmouseover="upDate(this)" onmouseleave="unDo()"
        onfocus="upDate(this)" onblur="unDo()">

    </div>

    <script src="script.js"></script>
</body>
</html>
